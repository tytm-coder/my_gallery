<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的图库 | Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }

.header { text-align: center; padding: 60px 20px 40px; }
.header h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: -0.5px; }
.header p { color: #666; font-size: 15px; }
.header .stats { display: flex; gap: 24px; justify-content: center; margin-top: 20px; }
.header .stat { background: rgba(255,255,255,0.04); padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
.header .stat-num { font-size: 24px; font-weight: 700; color: #667eea; }
.header .stat-label { font-size: 12px; color: #555; margin-top: 2px; }

.tabs { display: flex; justify-content: center; gap: 4px; margin: 0 auto 32px; max-width: 400px; background: rgba(255,255,255,0.03); padding: 4px; border-radius: 12px; }
.tab-btn { padding: 10px 24px; border: none; background: none; color: #666; font-size: 14px; cursor: pointer; border-radius: 10px; transition: all 0.25s; font-weight: 500; }
.tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.tab-btn:hover:not(.active) { color: #aaa; }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }
.gallery { columns: 4; column-gap: 12px; }
@media (max-width: 1200px) { .gallery { columns: 3; } }
@media (max-width: 900px)  { .gallery { columns: 2; } }
@media (max-width: 600px)  { .gallery { columns: 1; } }

.item { break-inside: avoid; margin-bottom: 12px; border-radius: 14px; overflow: hidden; position: relative; background: #12121a; cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
.item:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(102,126,234,0.08); }
.item img, .item video { width: 100%; display: block; transition: transform 0.5s; }
.item:hover img, .item:hover video { transform: scale(1.05); }
.item::after { content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; transition: box-shadow 0.3s; }
.item:hover::after { box-shadow: inset 0 0 0 1px rgba(102,126,234,0.3); }
.video-icon { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.item-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 14px 14px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85)); opacity: 0; transition: opacity 0.3s; }
.item:hover .item-info { opacity: 1; }
.item-name { font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-date { font-size: 11px; color: #666; margin-top: 2px; }

.loading { text-align: center; padding: 80px 20px; color: #666; }
.loading .spinner { width: 44px; height: 44px; border: 3px solid rgba(102,126,234,0.15); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 18px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 100px 20px; }
.empty-icon { font-size: 72px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.empty h2 { font-size: 22px; color: #555; margin-bottom: 8px; }
.empty p { color: #444; font-size: 14px; }

.footer { text-align: center; padding: 30px; color: #333; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.03); }

/* Lightbox */
.lb { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; display: none; align-items: center; justify-content: center; }
.lb.show { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.lb-media { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.lb-close { position: absolute; top: 20px; right: 24px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.lb-close:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
.lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.08); border: none; color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 22px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.lb-nav:hover { background: rgba(255,255,255,0.18); }
.lb-prev { left: 20px; }
.lb-next { right: 20px; }
.lb-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; font-size: 13px; color: #aaa; }

/* 懒加载占位 */
.skeleton { background: linear-gradient(90deg, #1a1a2a 25%, #222240 50%, #1a1a2a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 14px; height: 200px; margin-bottom: 12px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<div class="header">
  <h1>✨ My Gallery</h1>
  <p>图片与视频集锦</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalNum">-</div><div class="stat-label">全部</div></div>
    <div class="stat"><div class="stat-num" id="imgNum">-</div><div class="stat-label">图片</div></div>
    <div class="stat"><div class="stat-num" id="vidNum">-</div><div class="stat-label">视频</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="filterTab('all')">全部</button>
  <button class="tab-btn" onclick="filterTab('image')">📷 图片</button>
  <button class="tab-btn" onclick="filterTab('video')">🎬 视频</button>
</div>

<div class="container">
  <!-- 加载中 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>正在加载图库...</p>
  </div>

  <!-- 图库内容 -->
  <div class="gallery hidden" id="gallery"></div>

  <!-- 空 -->
  <div class="empty hidden" id="empty">
    <div class="empty-icon">🎨</div>
    <h2>图库空空的</h2>
    <p>管理员还没有上传任何内容哦~</p>
  </div>
</div>

<footer class="footer">Powered by JSONBin.io &amp; GitHub Pages</footer>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">&times;</button>
  <button class="lb-nav lb-prev" onclick="event.stopPropagation();nav(-1)">‹</button>
  <button class="lb-nav lb-next" onclick="event.stopPropagation();nav(1)">›</button>
  <img class="lb-media" id="lbImg" style="display:none">
  <video class="lb-media" id="lbVid" controls style="display:none"></video>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
const BIN_ID = '69e5b6feaaba882197195531';
const READ_KEY = '$2a$10$fScx5Wwda5ntTwdGYXoHezDhSydTYExLZvlvm/PNMBcK53ynQUbe';

let allImages = [];
let currentFilter = 'all';
let currentIndex = 0;

// 加载数据
(async function init() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': READ_KEY }
    });
    const data = await res.json();
    allImages = data.record?.images || [];
    updateStats();
    render();

    // 延迟隐藏 loading
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p style="color:#e74c3c">⚠️ 加载失败，请稍后重试</p>';
  }
})();

function updateStats() {
  const imgs = allImages.filter(i => i.type === 'image').length;
  const vids = allImages.filter(i => i.type === 'video').length;
  animateNum('totalNum', allImages.length);
  animateNum('imgNum', imgs);
  animateNum('vidNum', vids);
}

function animateNum(id, target) {
  const el = document.getElementById(id);
  el.textContent = target;
}

// 筛选
function filterTab(type) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(type === 'all' ? '全部' : type)));
  render();
}

function getFiltered() {
  if (currentFilter === 'all') return allImages;
  return allImages.filter(i => i.type === currentFilter);
}

// 渲染
function render() {
  const gallery = document.getElementById('gallery');
  const empty = document.getElementById('empty');
  const items = getFiltered();

  if (!items.length) {
    gallery.innerHTML = '';
    gallery.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  gallery.classList.remove('hidden');
  gallery.innerHTML = items.map((img, idx) => `
    <div class="item" onclick="openLb(${idx})">
      ${img.type === 'image'
        ? `<img src="${img.data}" alt="${img.name||''}" loading="lazy">`
        : `<div><video src="${img.data}" muted loop playsinline preload="metadata"></video><div class="video-icon">▶</div></div>`
      }
      <div class="item-info"><div class="item-name">${img.name || (img.type==='image'?'图片':'视频')}</div><div class="item-date">${img.date||''}</div></div>
    </div>
  `).join('');
}

// Lightbox
function openLb(idx) {
  const items = getFiltered();
  currentIndex = idx;
  showMedia(items[idx]);
  document.getElementById('lb').classList.add('show');
  updateCounter(items.length);
}

function showMedia(item) {
  const img = document.getElementById('lbImg');
  const vid = document.getElementById('lbVid');
  if (item.type === 'image') {
    img.src = item.data; img.style.display = ''; vid.style.display = 'none'; vid.pause();
  } else {
    vid.src = item.data; vid.style.display = ''; img.style.display = 'none'; vid.play();
  }
}

function closeLb(e) {
  if (e && e.target !== e.currentTarget && !e.target.closest('.lb-close')) return;
  document.getElementById('lb').classList.remove('show');
  document.getElementById('lbVid').pause();
}

function nav(dir) {
  const items = getFiltered();
  currentIndex = (currentIndex + dir + items.length) % items.length;
  showMedia(items[currentIndex]);
  updateCounter(items.length);
}

function updateCounter(total) {
  document.getElementById('lbCounter').textContent = `${currentIndex + 1} / ${total}`;
}

// 键盘导航
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('show')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') nav(-1);
  if (e.key === 'ArrowRight') nav(1);
});
</script>
</body>
</html>
