<!DOCTYPE html><html><head><meta charset="utf-8"><title>展示墙</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}h1{text-align:center;padding:35px 0 10px;font-size:2rem;background:linear-gradient(135deg,#fff,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{text-align:center;color:#94a3b8;padding-bottom:25px}.tabs{display:flex;justify-content:center;gap:9px;padding:0 20px 25px}.tabs button{padding:9px 22px;border:none;border-radius:99px;background:rgba(255,255,255,.08);color:#94a3b8;cursor:pointer}.tabs button.active{background:#6366f1;color:#fff}.up{max-width:900px;margin:0 auto 25px;padding:0 20px}.upbox{border:2px dashed rgba(255,255,255,.17);border-radius:14px;padding:40px;text-align:center;cursor:pointer;background:rgba(255,255,255,.02)}.upbox:hover{border-color:#6366f1}#fi{display:none}.grid{columns:4;column-gap:16px;max-width:1400px;margin:0 auto;padding:0 20px 55px}@media(max-width:1100px){.grid{columns:3}}@media(max-width:800px){.grid{columns:2}}@media(max-width:500px){.grid{columns:1}}.card{break-inside:avoid;margin-bottom:16px;border-radius:12px;overflow:hidden;background:#1e293b;transition:.3s;cursor:pointer}.card:hover{transform:translateY(-4px)scale(1.02);box-shadow:0 12px 36px rgba(0,0,0,.32)}.card img{width:100%;display:block;transition:transform .5s}.card:hover img{transform:scale(1.05)}.info{padding:12px 14px}.title{font-weight:600;margin-bottom:4px}.desc{font-size:.81rem;color:#94a3b8}.tag{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.7rem;font-weight:600;margin-top:7px;background:rgba(99,102,241,.13);color:#818cf8}.lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}.lb.show{display:flex}.lb img,.lb video{max-width:90vw;max-height:90vh;border-radius:10px}.lbx{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1.7rem;width:42px;height:42px;border-radius:50%;cursor:pointer}footer{text-align:center;padding:22px;color:#94a3b8;opacity:.5;font-size:.8rem}</style></head><body><h1>🎨 我的展示墙</h1><p class="sub">点击上传图片或视频</p><div class="tabs"><button class="active" onclick="st('all')">📁 全部</button><button onclick="st('image')">🖼️ 图片</button><button onclick="st('video')">🎬 视频</button></div><div class="up"><div class="upbox" onclick="document.getElementById('fi').click()"><div style="font-size:2.5rem">📤</div><p><strong>点击上传或拖拽文件</strong></p></div><input type="file" id="fi" multiple accept="image/*,video/*" onchange="hf(this.files)"></div><div class="grid" id="gr"></div><div class="lb" id="lb" onclick="document.getElementById('lb').classList.remove('show');document.getElementById('lbv').pause()"><button class="lbx">×</button><img id="lbi" style="display:none"><video id="lbv" controls style="display:none"></video></div><footer>展示墙 · 本地运行</footer><script>var it=JSON.parse(localStorage.getItem('gi')||'[]'),ct='all';function rd(){var g=document.getElementById('gr'),fl=it.filter(x=>ct=='all'||x.type==ct);g.innerHTML='';if(!fl.length)return;fl.forEach(m=>{var e=document.createElement('div');e.className='card';e.innerHTML=(m.type=='image'?`<img src="${m.src}" alt="${m.name}" loading=lazy>`:`<video src="${m.src}" muted loop></video>`)+`<div class="info"><div class="title">${m.name}</div><div class="desc">${m.time}</div><span class="tag">${m.type=='image'?'🖼️ 图片':'🎬 视频'}</span></div>`;e.onclick=()=>{if(m.type=='image'){document.getElementById('lbi').src=m.src;document.getElementById('lbi').style.display='block';document.getElementById('lbv').style.display='none'}else{document.getElementById('lbv').src=m.src;document.getElementById('lbv').style.display='block';document.getElementById('lbi').style.display='none'}document.getElementById('lb').classList.add('show')};g.appendChild(e)})}function st(t){ct=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');rd()}function hf(fl){for(var f of fl){if(!f.type.startsWith('image')&&!f.type.startsWith('video'))continue;var r=new FileReader();r.onload=e=>{it.unshift({id:Date.now()+Math.random(),type:f.type.startsWith('image')?'image':'video',src:e.target.result,name:f.name.replace(/\..+/,''),time:new Date().toLocaleDateString()});localStorage.setItem('gi',JSON.stringify(it));rd()};r.readAsDataURL(f)}}rd();if(!it.length)[{name:'山间日出'},{name:'城市夜景'},{name:'海边日落'},{name:'森林小径'},{name:'星空银河'},{name:'樱花大道'}].forEach((s,i)=>{s.type='image';s.id=Date.now()+i;s.time='示例';s.src='https://picsum.photos/seed/g'+i+'/400/'+[500,300,450,380,520,420][i];it.push(s)});localStorage.setItem('gi',JSON.stringify(it));rd();document.querySelector('.upbox').addEventListener('dragover',e=>e.preventDefault());document.querySelector('.upbox').addEventListener('drop',e=>{e.preventDefault();hf(e.dataTransfer.files)});document.addEventListener('keydown',e=>{if(e.key=='Escape')document.getElementById('lb').classList.remove('show')})</script></body></html>```
