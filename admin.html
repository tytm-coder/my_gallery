<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图库管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0}

.navbar{background:#16162a;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #252540}
.navbar h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.navbar a{color:#888;text-decoration:none;font-size:14px}.navbar a:hover{color:#667eea}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px}

.info{background:#181830;border:1px solid #282850;border-radius:12px;padding:18px 22px;margin-bottom:24px;line-height:2;color:#aaa;font-size:13.5px}
.info b{color:#7c8cf8}

/* ===== 上传区域 ===== */
.up-box{
border:2px dashed #3a3a5c;border-radius:16px;
padding:56px 20px;text-align:center;margin-bottom:24px;
transition:all .25s;background:#111120;
position:relative;overflow:hidden;cursor:pointer;
}
.up-box:hover,.up-box.drag-over{border-color:#667eea;background:rgba(102,126,234,.08)}
.up-icon{font-size:52px;margin-bottom:14px}.up-title{font-size:17px;color:#ddd;font-weight:600}
.up-sub{font-size:13px;color:#555;margin-top:8px}
/* label包裹所有可见内容，点击时触发隐藏input */
.up-label{display:block;cursor:pointer;z-index:2;position:relative}
/* 隐藏input：不用opacity覆盖，而是彻底移除 */
#fIn{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}

.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;
padding:14px 18px;background:#181830;border-radius:10px;flex-wrap:wrap;gap:10px}
.bar .cnt{color:#888;font-size:14px}.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;padding:10px 20px;transition:.2s}
.btn-exp{background:#00b894;color:#fff}.btn-exp:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,184,148,.35)}
.btn-imp{background:#e17055;color:#fff}.btn-imp:hover{transform:translateY(-1px)}
.btn-del{background:#ff6b6b;color:#fff;font-size:12px;padding:8px 16px}.btn-del:hover{transform:translateY(-1px)}
#impIn{display:none}

.grid{columns:4;column-gap:12px}@media(max-width:1100px){.grid{columns:3}}@media(max-width:800px){.grid{columns:2}}@media(max-width:500px){.grid{columns:1}}
.card{break-inside:avoid;margin-bottom:12px;border-radius:12px;overflow:hidden;background:#1a1a30;transition:.3s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.card img,.card video{width:100%;display:block}
.ovl{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 55%);opacity:0;transition:.3s;display:flex;align-items:flex-end;justify-content:space-between;padding:12px}
.card:hover .ovl{opacity:1}
.x-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,71,87,.92);color:#fff;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.tag-img{background:rgba(102,126,234,.88)}.tag-vid{background:rgba(118,75,162,.88)}

.emp{text-align:center;padding:70px 20px;color:#444}.emp-i{font-size:60px;margin-bottom:14px;opacity:.4}

.tips{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:10px;color:#fff;font-size:14px;z-index:9999;opacity:0;transition:.3s;font-weight:500}
.tips.on{opacity:1}.tips-ok{background:#00b894}.tips-err{background:#ff6b6b}

.lbx{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;display:none;align-items:center;justify-content:center;padding:36px}
.lbx.show{display:flex}
.lb-mc{max-width:90vw;max-height:84vh;object-fit:contain;border-radius:8px}
.lb-x{position:absolute;top:18px;right:24px;background:0 0;border:none;color:#fff;font-size:38px;cursor:pointer;opacity:.55;transition:.2s}
.lb-x:hover{opacity:1}
</style>
</head>
<body>

<nav class="navbar"><h1>🖼️ 图库管理后台</h1><a href="index.html">→ 公开浏览页</a></nav>

<div class="wrap">

<div class="info">
<b>工作流程：</b>拖拽上传 → 导出JSON → 上传GitHub → 公开页自动更新 ✅ 无需Token
</div>

<!-- ========== 上传区域 ========== -->
<!-- 外层div处理拖拽，内层label处理点击 -->
<div class="up-box" id="dz">
<label class="up-label" for="fIn">
<span class="up-icon">📤</span><br>
<span class="up-title">拖拽图片 / 视频到这里</span><br>
<span class="up-sub">或点击此区域选择文件 · JPG/PNG/GIF/WebP/MP4</span>
</label>
<input type="file" id="fIn" multiple accept="image/*,video/*">
</div>

<div class="bar"><span class="cnt" id="cnt">共 0 个文件</span><div class="btns">
<button class="btn btn-exp" onclick="doExp()">📥 导出到 JSON</button>
<button class="btn btn-imp" onclick="$('impIn').click()">📂 导入数据</button>
<input type="file" id="impIn" accept=".json">
<button class="btn btn-del" onclick="doClr()">🗑️ 清空</button></div></div>

<div class="grid" id="grid"></div>
<div class="emp hidden" id="emp"><div class="emp-i">📭</div><p style="font-size:15px;color:#555">还没有内容<br><small style="font-size:12px;color:#333">拖拽或点击上方区域开始</small></p></div>
</div>

<div class="lbx" id="lbx" onclick="doClb(event)"><button class="lb-x">&times;</button>
<img class="lb-mc" id="lbImg" style="display:none"><video class="lb-mc" id="lbVd" controls style="display:none"></video></div>
<div class="tips" id="tip"></div>

<script>
function $(i){return document.getElementById(i)};
var K='gal_v6',D=JSON.parse(localStorage.getItem(K)||'{"d":[]}').d||[];
function sv(){localStorage.setItem(K,JSON.stringify({d:D}));dr()}
function tip(m,t){var e=$('tip');e.textContent=m;e.className='tips on tips-'+(t||'ok');setTimeout(function(){e.className='tips'},2300)}

function dr(){
var g=$('grid'),c=$('cnt'),e=$('emp');
c.textContent='共 '+D.length+' 个文件';
if(!D.length){g.innerHTML='';e.className='emp';return}
e.className+=' hidden';
g.innerHTML=D.map(function(m,i){
return '<div class="card">'+(m.t==='img'?'<img src="'+m.v+'" loading=lazy>':'<video src="'+m.v+'" muted loop playsinline onmouseover=this.play() onmouseout=this.pause()></video>')+
'<div class="ovl"><span class="tag '+(m.t==='img'?'tag-img':'tag-vid')+'">'+(m.t==='img'?'📷 图片':'🎬 视频')+'</span>'+
'<button class="x-btn" onclick="rm('+i+',event)">✕</button></div></div>'
}).join('')
}

// ========== 拖拽绑定到外层容器 ==========
var dz=document.getElementById('dz');
dz.addEventListener('dragenter',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',function(e){
e.preventDefault();
if(dz.contains(e.relatedTarget))return;
dz.classList.remove('drag-over')
});
dz.addEventListener('drop',function(e){
e.preventDefault();dz.classList.remove('drag-over');
handleFiles(e.dataTransfer.files)
});

// ========== 点击通过 label-for 绑定（纯HTML原生）==========
$('fIn').addEventListener('change',function(){
handleFiles(this.files);
this.value=''
});

async function handleFiles(fs){
if(!fs||!fs.length)return;
var n=0;
for(var i=0;i<fs.length&&i<10;i++){
var f=fs[i];
if(!/^image|video/.test(f.type))continue;
var r=new FileReader(),v=await new Promise(function(ok){r.onload=function(){ok(r.result)};r.readAsDataURL(f)});
D.push({t:/^image/.test(f.type)?'img':'vid',n:f.name,v:v});n++
}sv();if(n)tip('✅ 已上传 '+n+' 个','ok')
}

window.rm=function(i,ev){ev.stopPropagation();D.splice(i,1);sv();tip('已删除')};

window.doExp=function(){
if(!D.length)return tip('没有数据','err');
var a=document.createElement('a'),data={images:D.map(function(x){return{x:x.t==='img'?'image':'video',name:x.n,data:x.v}})};
a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
a.download='data.json';a.click();URL.revokeObjectURL(a.href);tip('📥 已导出')
};

$('impIn').onchange=function(ev){
var f=ev.target.files[0];if(!f)return;
new FileReader().onload=function(){
try{
var o=JSON.parse(this.result),arr=o.images||o.d||[];
if(arr.length){D.length=0;arr.forEach(function(x){D.push({t:(x.x||x.type)==='image'||(x.x||x.type)==='img'?'img':'vid',n:x.name||'',v:x.data||x.d||x.v})});sv();tip('导入成功')}
else tip('格式错误','err')}catch(_){tip('解析失败','err')}
};f.readAsText(f);ev.target.value=''
};

window.doClr=function(){if(!D.length)return tip('已是空的','err');if(!confirm('清空全部？'))return;D.length=0;sv();tip('已清空')};

$('grid').onclick=function(ev){
var c=ev.target.closest('.card');if(!c||ev.target.closest('.x-btn'))return;
var m=c.querySelector('img')||c.querySelector('video');if(!m)return;
var im=$('lbImg'),vd=$('lbVd');
if(m.tagName==='IMG'){im.src=m.src;im.style.display='';vd.style.display='none';vd.pause()}
else{vd.src=m.src;vd.style.display='';im.style.display='none';vd.play()}$('lbx').className='lbx show'
};
window.doClb=function(ev){if(ev&&ev.target!==ev.currentTarget&&!ev.target.closest('.lb-x'))return;$('lbx').className='lbx';$('lbVd').pause()};
dr();
</script>
</body>
</html>
