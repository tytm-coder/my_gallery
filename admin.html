<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图库管理后台</title>
  <meta name="description" content="本地管理图库内容，上传图片视频并导出 data.json" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e2330;
      --text: #eef2ff;
      --muted: #aab3c5;
      --line: #2d3445;
      --brand: #6ea8fe;
      --brand-2: #8b5cf6;
      --danger: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: linear-gradient(180deg, #0b0e13 0%, #111522 100%);
      color: var(--text);
    }

    .wrap {
      width: min(1200px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(110, 168, 254, 0.16), rgba(139, 92, 246, 0.14));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 28px 22px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin: 18px 0;
    }

    .actions, .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #51607d;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: transparent;
      color: #fff;
    }

    .btn.danger {
      background: rgba(239, 68, 68, 0.12);
      color: #ffd4d4;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .btn.ok {
      background: rgba(34, 197, 94, 0.14);
      color: #d7ffe4;
      border-color: rgba(34, 197, 94, 0.35);
    }

    .stat {
      min-width: 110px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .v {
      font-size: 22px;
      font-weight: 800;
    }

    .msg {
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.ok {
      color: #d7ffe4;
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.35);
    }

    .msg.error {
      color: #ffd4d4;
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .dropzone {
      border: 2px dashed #4a5673;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      padding: 34px 20px;
      text-align: center;
      transition: 0.2s ease;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .dropzone.dragover {
      border-color: var(--brand);
      background: rgba(110, 168, 254, 0.08);
      transform: scale(1.01);
    }

    .dropzone h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .dropzone p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .pick-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .hint {
      margin-top: 12px;
      color: #c9d3e6;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #43506e;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0d1017;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .thumb img,
    .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .tag {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(6px);
    }

    .body {
      padding: 12px 14px 14px;
    }

    .name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .btn {
      flex: 1;
      padding: 9px 10px;
      font-size: 13px;
    }

    .empty {
      padding: 34px 18px;
      border-radius: 18px;
      border: 1px dashed #3c475f;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
    }

    .hidden {
      display: none !important;
    }

    .mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.76);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    .mask.show {
      display: flex;
    }

    .viewer {
      width: min(1000px, 100%);
      max-height: calc(100vh - 36px);
      background: #11151e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
    }

    .viewer-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .viewer-title {
      font-weight: 700;
      font-size: 14px;
      word-break: break-all;
    }

    .viewer-bd {
      background: #0a0d13;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      max-height: calc(100vh - 150px);
      overflow: auto;
    }

    .viewer-bd img,
    .viewer-bd video {
      max-width: 100%;
      max-height: calc(100vh - 170px);
      display: block;
      background: #000;
    }

    .viewer-ft {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 24px;
      }

      .toolbar {
        align-items: stretch;
      }

      .actions, .stats {
        width: 100%;
      }

      .stat {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 class="title">图库管理后台</h1>
      <p class="desc">
        这里是本地管理页，不需要 Token。上传后的内容保存在当前浏览器 localStorage 里。<br />
        你上传完成后，点“导出 data.json”，再把导出的文件上传到 GitHub 仓库根目录，公开页就能同步显示。
      </p>
    </section>

    <div class="toolbar">
      <div class="actions">
        <label for="fileInput" class="btn primary">选择图片/视频</label>
        <button class="btn ok" id="exportBtn">导出 data.json</button>
        <label for="importInput" class="btn">导入 JSON（覆盖本地）</label>
        <button class="btn danger" id="clearBtn">清空全部</button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">总数</div>
          <div class="v" id="statAll">0</div>
        </div>
        <div class="stat">
          <div class="k">图片</div>
          <div class="v" id="statImg">0</div>
        </div>
        <div class="stat">
          <div class="k">视频</div>
          <div class="v" id="statVideo">0</div>
        </div>
      </div>
    </div>

    <div id="msg" class="msg">准备就绪。你可以点击上传，也可以直接把文件拖进下面的虚线框。</div>

    <div id="dropzone" class="dropzone">
      <h3>拖拽文件到这里</h3>
      <p>支持图片和视频。点击下面按钮也可以手动选择文件。</p>
      <div class="pick-row">
        <label for="fileInput" class="btn primary">点击选择文件</label>
      </div>
      <div class="hint">这个版本不再使用 JS 强制触发 click()，所以不会再被拦截器恶心一手。</div>
    </div>

    <div id="empty" class="empty hidden">
      现在还没有内容。先上传几张图片试试。
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <input id="fileInput" type="file" accept="image/*,video/*" multiple />
  <input id="importInput" type="file" accept=".json,application/json" />

  <div id="mask" class="mask" onclick="closeViewer(event)">
    <div class="viewer" onclick="event.stopPropagation()">
      <div class="viewer-hd">
        <div id="viewerTitle" class="viewer-title">预览</div>
        <button class="btn" onclick="closeViewer()">关闭</button>
      </div>
      <div id="viewerBody" class="viewer-bd"></div>
      <div id="viewerInfo" class="viewer-ft">-</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "gallery_data_v6";

    let images = [];

    const msgEl = document.getElementById("msg");
    const gridEl = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const statAllEl = document.getElementById("statAll");
    const statImgEl = document.getElementById("statImg");
    const statVideoEl = document.getElementById("statVideo");
    const fileInput = document.getElementById("fileInput");
    const importInput = document.getElementById("importInput");
    const dropzone = document.getElementById("dropzone");

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (type ? " " + type : "");
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function(s) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[s];
      });
    }

    function normalizeType(type, data) {
      const t = String(type || "").trim().toLowerCase();
      if (t === "video" || t === "vid" || t === "mp4") return "video";
      if (t === "image" || t === "img" || t === "photo" || t === "pic") return "image";

      const v = String(data || "").toLowerCase();
      if (v.startsWith("data:video/")) return "video";
      return "image";
    }

    function normalizeItem(x, idx) {
      const value = x && (x.data || x.d || x.v || x.url || "");
      const name = x && (x.name || x.n || x.title || ("未命名_" + (idx + 1)));
      const type = normalizeType(x && (x.type || x.t || x.x || ""), value);

      return {
        type: type,
        name: String(name || "").trim() || ("未命名_" + (idx + 1)),
        data: String(value || "")
      };
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ images: images }));
        return true;
      } catch (err) {
        setMsg("保存失败：浏览器本地存储空间可能不够。尤其是视频太大时很容易爆。建议减少大文件后再试。", "error");
        return false;
      }
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          images = [];
          render();
          return;
        }

        const json = JSON.parse(raw);
        const arr = Array.isArray(json) ? json : (Array.isArray(json.images) ? json.images : []);
        images = arr.map(normalizeItem).filter(function(item) {
          return !!item.data;
        });
      } catch (err) {
        images = [];
        setMsg("读取本地数据失败，已重置为空。", "error");
      }

      render();
    }

    function updateStats() {
      const imgCount = images.filter(function(x) { return x.type === "image"; }).length;
      const videoCount = images.filter(function(x) { return x.type === "video"; }).length;

      statAllEl.textContent = images.length;
      statImgEl.textContent = imgCount;
      statVideoEl.textContent = videoCount;
    }

    function render() {
      updateStats();

      if (!images.length) {
        gridEl.innerHTML = "";
        emptyEl.classList.remove("hidden");
        return;
      }

      emptyEl.classList.add("hidden");

      gridEl.innerHTML = images.map(function(item, idx) {
        const media = item.type === "video"
          ? "<video src=\"" + item.data + "\" muted playsinline preload=\"metadata\"></video>"
          : "<img src=\"" + item.data + "\" alt=\"" + escapeHtml(item.name) + "\" loading=\"lazy\" />";

        const tag = item.type === "video" ? "视频" : "图片";

        return ""
          + "<div class=\"card\">"
          + "  <div class=\"thumb\" onclick=\"previewItem(" + idx + ")\">"
          +        media
          + "    <div class=\"tag\">" + tag + "</div>"
          + "  </div>"
          + "  <div class=\"body\">"
          + "    <div class=\"name\">" + escapeHtml(item.name) + "</div>"
          + "    <div class=\"sub\">点击缩略图可预览</div>"
          + "    <div class=\"row\">"
          + "      <button class=\"btn danger\" onclick=\"removeItem(" + idx + ")\">删除</button>"
          + "    </div>"
          + "  </div>"
          + "</div>";
      }).join("");
    }

    function readFileAsDataURL(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function() {
          resolve(reader.result);
        };
        reader.onerror = function() {
          reject(new Error("读取文件失败：" + file.name));
        };
        reader.readAsDataURL(file);
      });
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList || []);
      const validFiles = files.filter(function(file) {
        return file && (file.type.startsWith("image/") || file.type.startsWith("video/"));
      });

      if (!validFiles.length) {
        setMsg("没有检测到可上传的图片或视频文件。", "error");
        return;
      }

      setMsg("正在处理 " + validFiles.length + " 个文件，请稍等...", "");

      let added = 0;

      for (const file of validFiles) {
        try {
          const dataUrl = await readFileAsDataURL(file);
          images.unshift({
            type: file.type.startsWith("video/") ? "video" : "image",
            name: file.name,
            data: dataUrl
          });
          added++;
        } catch (err) {
          console.error(err);
        }
      }

      if (!saveData()) {
        loadData();
        return;
      }

      render();
      setMsg("上传完成，成功加入 " + added + " 个文件。记得导出 data.json 后再上传到 GitHub。", "ok");
    }

    function exportData() {
      const payload = {
        images: images.map(function(item) {
          return {
            type: item.type,
            name: item.name,
            data: item.data
          };
        })
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], {
        type: "application/json;charset=utf-8"
      });

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "data.json";
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(function() {
        URL.revokeObjectURL(a.href);
      }, 1000);

      setMsg("已导出 data.json。下一步把它上传到 GitHub 仓库根目录。", "ok");
    }

    async function importData(file) {
      if (!file) return;

      try {
        const text = await file.text();
        const json = JSON.parse(text);
        const arr = Array.isArray(json) ? json : (Array.isArray(json.images) ? json.images : []);
        const next = arr.map(normalizeItem).filter(function(item) {
          return !!item.data;
        });

        if (!next.length) {
          setMsg("导入失败：JSON 里没有可用内容。", "error");
          return;
        }

        images = next;

        if (!saveData()) {
          return;
        }

        render();
        setMsg("JSON 导入成功，已覆盖本地数据，共 " + images.length + " 条。", "ok");
      } catch (err) {
        setMsg("导入失败：" + err.message, "error");
      }
    }

    window.removeItem = function(idx) {
      const item = images[idx];
      if (!item) return;

      if (!confirm("确定删除：\n" + item.name + " ?")) return;

      images.splice(idx, 1);
      if (!saveData()) return;
      render();
      setMsg("已删除：" + item.name, "ok");
    };

    document.getElementById("exportBtn").addEventListener("click", exportData);

    document.getElementById("clearBtn").addEventListener("click", function() {
      if (!images.length) {
        setMsg("现在本来就是空的。", "");
        return;
      }

      if (!confirm("确定清空全部内容吗？这会清掉当前浏览器里的本地图库数据。")) return;

      images = [];
      if (!saveData()) return;
      render();
      setMsg("已清空全部内容。", "ok");
    });

    fileInput.addEventListener("change", function(e) {
      handleFiles(e.target.files);
      e.target.value = "";
    });

    importInput.addEventListener("change", function(e) {
      if (!e.target.files || !e.target.files[0]) return;

      if (!confirm("导入 JSON 会覆盖当前本地数据，确定继续吗？")) {
        e.target.value = "";
        return;
      }

      importData(e.target.files[0]);
      e.target.value = "";
    });

    ["dragenter", "dragover"].forEach(function(evtName) {
      dropzone.addEventListener(evtName, function(e) {
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.add("dragover");
      });
    });

    ["dragleave", "dragend"].forEach(function(evtName) {
      dropzone.addEventListener(evtName, function(e) {
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.remove("dragover");
      });
    });

    dropzone.addEventListener("drop", function(e) {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove("dragover");

      const files = e.dataTransfer && e.dataTransfer.files;
      if (!files || !files.length) {
        setMsg("没有读取到拖拽文件。", "error");
        return;
      }

      handleFiles(files);
    });

    const maskEl = document.getElementById("mask");
    const viewerTitleEl = document.getElementById("viewerTitle");
    const viewerBodyEl = document.getElementById("viewerBody");
    const viewerInfoEl = document.getElementById("viewerInfo");

    window.previewItem = function(idx) {
      const item = images[idx];
      if (!item) return;

      viewerTitleEl.textContent = item.name;
      viewerInfoEl.textContent = "类型：" + (item.type === "video" ? "视频" : "图片");

      if (item.type === "video") {
        viewerBodyEl.innerHTML = "<video src=\"" + item.data + "\" controls autoplay playsinline></video>";
      } else {
        viewerBodyEl.innerHTML = "<img src=\"" + item.data + "\" alt=\"" + escapeHtml(item.name) + "\" />";
      }

      maskEl.classList.add("show");
    };

    window.closeViewer = function() {
      maskEl.classList.remove("show");
      viewerBodyEl.innerHTML = "";
    };

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeViewer();
    });

    loadData();
  </script>
</body>
</html>
